<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>MindMend | Settings</title>
          <script src="https://cdn.tailwindcss.com">
          </script>
          <script src="https://unpkg.com/@phosphor-icons/web">
          </script>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="style.css">
            </head>
            <body class="flex min-h-screen w-full selection:bg-white/20">
              <script>
                (function () {
                  var t = localStorage.getItem('mindmend-theme');
                  var b = localStorage.getItem('mindmend-bold-text') === 'true';
                  if (t === 'light') document.body.classList.add('light-mode');
                  if (b) document.body.classList.add('bold-text');
                })();
              </script>
              <div class="noise-overlay">
              </div>
              <div class="fixed inset-0 z-0 overflow-hidden">
                <div class="aurora-orb w-[900px] h-[900px] -top-[25%] left-[5%] animate-drift" style="background:radial-gradient(circle,rgba(139,92,246,.4) 0,rgba(236,72,153,.25) 40%,rgba(0,0,0,0) 75%)">
                </div>
                <div class="aurora-orb w-[700px] h-[700px] top-[20%] right-[10%] animate-drift-slow" style="background:radial-gradient(circle,rgba(59,130,246,.35) 0,rgba(34,211,238,.3) 45%,rgba(0,0,0,0) 75%)">
                </div>
              </div>

                          <div class="space-y-4">

                              <div id="user-avatar" class="w-16 h-16 rounded-full bg-gradient-to-br from-purple-500 to-pink-500">
                              </div>
                              <div>

                                          <button id="theme-dark" class="px-4 py-2 rounded-lg bg-white/10 text-white transition hover:bg-white/15">

                                            </i> Dark</button> <button id="theme-light" class="px-4 py-2 rounded-lg bg-white/5 text-white/50 transition hover:bg-white/10">

                                          </div>

                                              </div>
                                            </div>
                                          </div>

                                                          <i class="ph-bold ph-sign-out">
                                                          </i> Sign Out</button>
                                                        </div>
                                                      </div>
                                                    </div>
                                                  </main>
