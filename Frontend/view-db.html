<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View MongoDB Users</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-4xl font-bold mb-8">MongoDB Users & Entries</h1>
    
    <div class="flex gap-4 mb-6">
      <button onclick="loadUsers()" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-lg">
        Refresh Users
      </button>
      <button onclick="loadEntries()" class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-lg">
        Refresh Entries
      </button>
      <button onclick="checkDB()" class="bg-purple-500 hover:bg-purple-600 px-6 py-3 rounded-lg">
        Check DB Status
      </button>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Users Section -->
      <div class="bg-gray-800 rounded-lg p-6">
        <h2 class="text-2xl font-bold mb-4">Users (<span id="user-count">0</span>)</h2>
        <div id="users-list" class="space-y-3 max-h-[600px] overflow-y-auto">
          <p class="text-gray-400">Click "Refresh Users" to load...</p>
        </div>
      </div>
      
      <!-- Entries Section -->
      <div class="bg-gray-800 rounded-lg p-6">
        <h2 class="text-2xl font-bold mb-4">Entries (<span id="entry-count">0</span>)</h2>
        <div id="entries-list" class="space-y-3 max-h-[600px] overflow-y-auto">
          <p class="text-gray-400">Click "Refresh Entries" to load...</p>
        </div>
      </div>
    </div>
    
    <!-- DB Status -->
    <div class="mt-6 bg-gray-800 rounded-lg p-6">
      <h2 class="text-2xl font-bold mb-4">Database Status</h2>
      <pre id="db-status" class="text-sm text-gray-400 overflow-auto">Not checked yet...</pre>
    </div>
  </div>

  <script>
    async function loadUsers() {
      try {
        const response = await fetch('/api/admin/users');
        const data = await response.json();
        const users = data.users || [];
        
        document.getElementById('user-count').textContent = users.length;
        
        if (users.length === 0) {
          document.getElementById('users-list').innerHTML = '<p class="text-yellow-400">No users found in MongoDB!</p>';
          return;
        }
        
        document.getElementById('users-list').innerHTML = users.map(user => `
          <div class="bg-gray-700 p-4 rounded-lg">
            <div class="font-semibold text-lg">${user.firstName || ''} ${user.lastName || ''}</div>
            <div class="text-sm text-gray-300">${user.email}</div>
            <div class="text-xs text-gray-400 mt-2">Clerk ID: ${user.clerkId}</div>
            <div class="text-xs text-gray-400">Created: ${new Date(user.createdAt).toLocaleString()}</div>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('users-list').innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
      }
    }
    
    async function loadEntries() {
      try {
        const response = await fetch('/api/admin/entries');
        const data = await response.json();
        const entries = data.entries || [];
        
        document.getElementById('entry-count').textContent = entries.length;
        
        if (entries.length === 0) {
          document.getElementById('entries-list').innerHTML = '<p class="text-yellow-400">No entries found in MongoDB!</p>';
          return;
        }
        
        document.getElementById('entries-list').innerHTML = entries.map(entry => `
          <div class="bg-gray-700 p-4 rounded-lg">
            <div class="font-semibold">${entry.userEmail || 'Unknown User'}</div>
            <div class="text-sm text-gray-300">Date: ${entry.date}</div>
            <div class="text-sm">
              <span class="inline-block px-2 py-1 rounded text-xs ${getMoodColor(entry.moodValue)}">
                ${entry.moodLabel} (${entry.moodValue})
              </span>
            </div>
            <div class="text-xs text-gray-400 mt-2">${entry.text.substring(0, 100)}...</div>
          </div>
        `).join('');
      } catch (error) {
        document.getElementById('entries-list').innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
      }
    }
    
    async function checkDB() {
      try {
        const response = await fetch('/api/debug/db');
        const data = await response.json();
        document.getElementById('db-status').textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById('db-status').textContent = `Error: ${error.message}`;
      }
    }
    
    function getMoodColor(value) {
      if (value <= 20) return 'bg-red-500 text-white';
      if (value <= 40) return 'bg-orange-500 text-white';
      if (value <= 60) return 'bg-yellow-500 text-black';
      if (value <= 80) return 'bg-green-500 text-white';
      return 'bg-cyan-500 text-white';
    }
    
    // Auto-load on page load
    window.addEventListener('DOMContentLoaded', () => {
      loadUsers();
      loadEntries();
      checkDB();
    });
  </script>
</body>
</html>
